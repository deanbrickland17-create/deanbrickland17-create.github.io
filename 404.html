<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Dean Brickland</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">

<style>
  :root{
    --fog:#E4E7E5;
    --ink:#24292C;
    --ink-soft:#5C666B;
    --denim-ink:#4C5E6C;
    --line:#C6CCCA;
    --helv:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--helv);
    background:var(--fog);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; }
  a:focus-visible{ outline:2px solid var(--denim-ink); outline-offset:3px; }
  .card{ max-width:32rem; text-align:center; }
  .chip{
    width:36px; height:36px;
    margin-inline:auto;
    margin-bottom:2rem;
    opacity:.8;
    filter:grayscale(1);
  }
  .chip img{ width:100%; height:100%; object-fit:contain; display:block; }
  .code{
    font-family:"IBM Plex Mono",monospace;
    font-size:.68rem;
    letter-spacing:.14em;
    text-transform:lowercase;
    color:var(--ink-soft);
    margin-bottom:1.2rem;
  }
  h1{
    font-size:clamp(1.4rem,3.6vw,1.9rem);
    font-weight:500;
    letter-spacing:-.008em;
    text-transform:lowercase;
    margin-bottom:1rem;
  }
  p{ color:var(--ink-soft); font-size:.9rem; margin-bottom:2rem; }
  .btn{
    display:inline-block;
    font-size:.8rem; text-transform:lowercase; letter-spacing:.03em;
    border:1px solid var(--ink);
    border-radius:999px;
    padding:.55rem 1.3rem;
    text-decoration:none;
    transition:background .15s ease, color .15s ease;
  }
  .btn:hover{ background:var(--ink); color:var(--fog); }
</style>
</head>
<body>
  <div class="card">
    <div class="chip"><img src="logo.png" alt="Dean Brickland"></div>
    <div class="code">404 / not found</div>
    <h1>this page doesn't exist.</h1>
    <p>The link may be broken, or the page may have moved. Head back to the homepage to find what you're looking for.</p>
    <a class="btn" href="/">back to homepage</a>
  </div>
</body>
</html>
