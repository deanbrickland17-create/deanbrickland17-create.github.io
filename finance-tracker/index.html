<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Personal Finance Tracker</title>
<meta name="description" content="A private, browser-based personal finance tracker. Log income and expenses, set budgets, and see where your money goes. All data stays on your device.">
<style>
  /* ============================================================
     Ledger — a self-contained personal finance tracker.
     No frameworks, no network. Data lives in localStorage.
     ============================================================ */
  :root{
    --bg:        #0e1116;
    --surface:   #161b22;
    --surface-2: #1c232d;
    --line:      #262f3b;
    --line-soft: #1f2731;
    --text:      #e6edf3;
    --text-dim:  #9aa7b4;
    --text-mute: #6b7684;
    --accent:    #4f8cff;
    --income:    #3fb950;
    --expense:   #f0596c;
    --warn:      #e3b341;
    --radius:    14px;
    --radius-sm: 10px;
    --shadow:    0 8px 30px rgba(0,0,0,.35);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    /* category palette */
    --c1:#4f8cff; --c2:#3fb950; --c3:#f0596c; --c4:#e3b341;
    --c5:#a371f7; --c6:#39c5cf; --c7:#f778ba; --c8:#db8f3f;
  }
  html[data-theme="light"]{
    --bg:        #f4f6f9;
    --surface:   #ffffff;
    --surface-2: #f0f3f7;
    --line:      #e2e8f0;
    --line-soft: #eef1f5;
    --text:      #17212b;
    --text-dim:  #566372;
    --text-mute: #8592a0;
    --shadow:    0 8px 30px rgba(20,40,80,.08);
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    font-size:15px;
  }
  h1,h2,h3{ margin:0; font-weight:650; letter-spacing:-.01em; }
  button{ font-family:inherit; cursor:pointer; }
  input,select{ font-family:inherit; }
  ::selection{ background:var(--accent); color:#fff; }

  .wrap{ max-width:1080px; margin-inline:auto; padding:0 clamp(14px,4vw,32px); }

  /* ---------- Header ---------- */
  header.top{
    position:sticky; top:0; z-index:20;
    background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .top-inner{ display:flex; align-items:center; gap:14px; padding:14px 0; }
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:-.02em; font-size:1.05rem; }
  .logo .mark{
    width:30px; height:30px; border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#7aa7ff);
    display:grid; place-items:center; color:#fff; font-weight:800; font-size:.95rem;
    box-shadow:0 2px 10px rgba(79,140,255,.4);
  }
  .top-spacer{ flex:1; }
  .icon-btn{
    display:inline-grid; place-items:center; width:38px; height:38px;
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    color:var(--text-dim); font-size:1rem; transition:.15s;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--accent); }

  /* ---------- Month bar ---------- */
  .monthbar{ display:flex; align-items:center; justify-content:center; gap:16px; margin:22px 0 6px; }
  .monthbar h2{ font-size:1.15rem; min-width:170px; text-align:center; font-variant-numeric:tabular-nums; }
  .month-nav{
    width:34px; height:34px; border-radius:9px; background:var(--surface);
    border:1px solid var(--line); color:var(--text-dim); font-size:1.1rem; line-height:1;
    display:grid; place-items:center; transition:.15s;
  }
  .month-nav:hover{ color:var(--text); border-color:var(--accent); }

  /* ---------- Summary cards ---------- */
  .cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:16px 0 26px; }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 18px 16px; position:relative; overflow:hidden;
  }
  .card .k{ font-size:.72rem; text-transform:uppercase; letter-spacing:.09em; color:var(--text-mute); font-weight:600; }
  .card .v{ font-size:clamp(1.4rem,3.2vw,1.9rem); font-weight:700; margin-top:6px; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .card.income .v{ color:var(--income); }
  .card.expense .v{ color:var(--expense); }
  .card .bar{ position:absolute; left:0; top:0; bottom:0; width:4px; }
  .card.income .bar{ background:var(--income); }
  .card.expense .bar{ background:var(--expense); }
  .card.balance .bar{ background:var(--accent); }
  .card .sub{ font-size:.76rem; color:var(--text-mute); margin-top:4px; }

  /* ---------- Layout ---------- */
  .grid{ display:grid; grid-template-columns:1.25fr 1fr; gap:20px; align-items:start; }
  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line-soft); }
  .panel-head h3{ font-size:.95rem; }
  .panel-body{ padding:6px 18px 18px; }

  /* ---------- Form ---------- */
  .field{ margin-top:14px; }
  .field label{ display:block; font-size:.74rem; color:var(--text-dim); margin-bottom:6px; font-weight:600; letter-spacing:.02em; }
  .input, select.input{
    width:100%; padding:11px 12px; background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:var(--radius-sm); font-size:.95rem; transition:.15s;
    appearance:none;
  }
  .input:focus, select.input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .seg{ display:grid; grid-template-columns:1fr 1fr; gap:8px; background:var(--surface-2); padding:5px; border-radius:var(--radius-sm); border:1px solid var(--line); }
  .seg button{
    padding:9px; border:0; border-radius:8px; background:transparent; color:var(--text-dim);
    font-weight:650; font-size:.88rem; transition:.15s;
  }
  .seg button.active[data-kind="expense"]{ background:var(--expense); color:#fff; }
  .seg button.active[data-kind="income"]{ background:var(--income); color:#052e10; }
  .amount-wrap{ position:relative; }
  .amount-wrap .cur{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-mute); font-weight:600; }
  .amount-wrap .input{ padding-left:26px; font-variant-numeric:tabular-nums; }
  .btn-primary{
    width:100%; margin-top:16px; padding:12px; border:0; border-radius:var(--radius-sm);
    background:var(--accent); color:#fff; font-weight:700; font-size:.95rem; transition:.15s;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:active{ transform:translateY(1px); }

  /* ---------- Chart ---------- */
  .chart-wrap{ display:flex; align-items:center; gap:18px; padding:6px 0 2px; }
  .donut{ flex:0 0 132px; }
  .legend{ flex:1; display:flex; flex-direction:column; gap:8px; min-width:0; }
  .legend-row{ display:flex; align-items:center; gap:9px; font-size:.85rem; }
  .legend-row .dot{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .legend-row .nm{ flex:1; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .legend-row .amt{ font-variant-numeric:tabular-nums; font-weight:600; }
  .legend-row .pct{ color:var(--text-mute); font-size:.76rem; width:42px; text-align:right; font-variant-numeric:tabular-nums; }

  /* ---------- Transactions ---------- */
  .filters{ display:flex; gap:8px; align-items:center; }
  .filters select{ padding:7px 9px; font-size:.82rem; background:var(--surface-2); color:var(--text-dim); border:1px solid var(--line); border-radius:8px; }
  .tx-list{ list-style:none; margin:0; padding:0; }
  .tx{
    display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid var(--line-soft);
  }
  .tx:last-child{ border-bottom:0; }
  .tx .ic{ width:38px; height:38px; border-radius:10px; display:grid; place-items:center; flex:0 0 auto; font-size:1rem; background:var(--surface-2); }
  .tx .meta{ flex:1; min-width:0; }
  .tx .desc{ font-weight:600; font-size:.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx .info{ font-size:.76rem; color:var(--text-mute); margin-top:2px; }
  .tx .val{ font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }
  .tx .val.income{ color:var(--income); }
  .tx .val.expense{ color:var(--expense); }
  .tx .del{ background:transparent; border:0; color:var(--text-mute); font-size:1.05rem; padding:4px 6px; border-radius:8px; opacity:0; transition:.15s; }
  .tx:hover .del{ opacity:1; }
  .tx .del:hover{ color:var(--expense); background:color-mix(in srgb,var(--expense) 15%,transparent); }

  .empty{ text-align:center; padding:34px 16px; color:var(--text-mute); }
  .empty .em-ic{ font-size:2rem; opacity:.5; }
  .empty p{ margin:8px 0 0; font-size:.9rem; }

  /* ---------- Footer / actions ---------- */
  .foot{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; margin:30px 0 48px; color:var(--text-mute); font-size:.8rem; }
  .foot button{ background:var(--surface); border:1px solid var(--line); color:var(--text-dim); padding:8px 13px; border-radius:9px; font-size:.8rem; transition:.15s; }
  .foot button:hover{ color:var(--text); border-color:var(--accent); }
  .foot .sep{ opacity:.4; }
  .danger:hover{ color:var(--expense)!important; border-color:var(--expense)!important; }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--text); color:var(--bg); padding:11px 18px; border-radius:11px; font-size:.86rem; font-weight:600;
    box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:.25s; z-index:60;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:820px){
    .grid{ grid-template-columns:1fr; }
    .cards{ grid-template-columns:1fr; }
    .card{ display:flex; align-items:center; justify-content:space-between; }
    .card .v{ margin-top:0; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap top-inner">
    <div class="logo"><span class="mark">L</span> Ledger</div>
    <div class="top-spacer"></div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </div>
</header>

<main class="wrap">

  <div class="monthbar">
    <button class="month-nav" id="prevMonth" aria-label="Previous month">‹</button>
    <h2 id="monthLabel">—</h2>
    <button class="month-nav" id="nextMonth" aria-label="Next month">›</button>
  </div>

  <section class="cards">
    <div class="card income"><span class="bar"></span><div class="k">Income</div><div class="v" id="sumIncome">€0</div></div>
    <div class="card expense"><span class="bar"></span><div class="k">Expenses</div><div class="v" id="sumExpense">€0</div></div>
    <div class="card balance"><span class="bar"></span><div class="k">Balance</div><div class="v" id="sumBalance">€0</div><div class="sub" id="balSub"></div></div>
  </section>

  <div class="grid">

    <!-- Left column: transactions -->
    <div class="panel">
      <div class="panel-head">
        <h3>Transactions</h3>
        <div class="filters">
          <select id="filterType" aria-label="Filter by type">
            <option value="all">All</option>
            <option value="income">Income</option>
            <option value="expense">Expenses</option>
          </select>
        </div>
      </div>
      <div class="panel-body">
        <ul class="tx-list" id="txList"></ul>
      </div>
    </div>

    <!-- Right column: add form + chart -->
    <div style="display:flex; flex-direction:column; gap:20px;">
      <div class="panel">
        <div class="panel-head"><h3>Add transaction</h3></div>
        <div class="panel-body">
          <form id="txForm">
            <div class="seg" id="kindSeg">
              <button type="button" data-kind="expense" class="active">Expense</button>
              <button type="button" data-kind="income">Income</button>
            </div>
            <div class="field">
              <label for="fDesc">Description</label>
              <input class="input" id="fDesc" type="text" placeholder="e.g. Groceries" maxlength="60" required>
            </div>
            <div class="row2">
              <div class="field">
                <label for="fAmount">Amount</label>
                <div class="amount-wrap">
                  <span class="cur">€</span>
                  <input class="input" id="fAmount" type="number" min="0.01" step="0.01" placeholder="0.00" inputmode="decimal" required>
                </div>
              </div>
              <div class="field">
                <label for="fDate">Date</label>
                <input class="input" id="fDate" type="date" required>
              </div>
            </div>
            <div class="field">
              <label for="fCategory">Category</label>
              <select class="input" id="fCategory"></select>
            </div>
            <button class="btn-primary" type="submit">Add transaction</button>
          </form>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h3>Spending by category</h3></div>
        <div class="panel-body">
          <div id="chartArea"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="foot">
    <button id="exportBtn">↓ Export CSV</button>
    <button id="importBtn">↑ Import CSV</button>
    <input type="file" id="importFile" accept=".csv,text/csv" hidden>
    <span class="sep">·</span>
    <button id="clearBtn" class="danger">Clear all data</button>
    <span class="sep">·</span>
    <span id="dataNote">Stored privately in this browser</span>
  </div>

</main>

<div id="toast"></div>

<script>
(function(){
  "use strict";

  var STORE_KEY = "ledger.transactions.v1";
  var THEME_KEY = "ledger.theme";

  var CATEGORIES = {
    expense: [
      ["Groceries","🛒"],["Rent & Bills","🏠"],["Transport","🚕"],["Eating Out","🍽️"],
      ["Shopping","🛍️"],["Health","🩺"],["Entertainment","🎬"],["Travel","✈️"],
      ["Education","📚"],["Other","•"]
    ],
    income: [
      ["Salary","💼"],["Freelance","🧾"],["Investments","📈"],["Gifts","🎁"],["Other","•"]
    ]
  };
  var CAT_COLORS = ["--c1","--c2","--c3","--c4","--c5","--c6","--c7","--c8"];

  // ---------- State ----------
  var tx = load();
  var viewDate = new Date(); viewDate.setDate(1);
  var kind = "expense";

  // ---------- Persistence ----------
  function load(){
    try { var raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : []; }
    catch(e){ return []; }
  }
  function save(){
    try { localStorage.setItem(STORE_KEY, JSON.stringify(tx)); }
    catch(e){ toast("Couldn't save — storage full or blocked"); }
  }

  // ---------- Helpers ----------
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function fmt(n){
    return "€" + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function monthKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
  function catIcon(k, name){
    var list = CATEGORIES[k] || [];
    for(var i=0;i<list.length;i++){ if(list[i][0]===name) return list[i][1]; }
    return k==="income" ? "＋" : "•";
  }
  function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  // ---------- Rendering ----------
  function currentMonthTx(){
    var mk = monthKey(viewDate);
    return tx.filter(function(t){ return t.date.slice(0,7) === mk; });
  }

  function render(){
    var mtx = currentMonthTx();
    var income = 0, expense = 0;
    mtx.forEach(function(t){ if(t.kind==="income") income += t.amount; else expense += t.amount; });
    var balance = income - expense;

    document.getElementById("monthLabel").textContent =
      viewDate.toLocaleDateString(undefined,{month:"long", year:"numeric"});
    document.getElementById("sumIncome").textContent = fmt(income);
    document.getElementById("sumExpense").textContent = fmt(expense);
    var balEl = document.getElementById("sumBalance");
    balEl.textContent = (balance<0?"−":"") + fmt(balance);
    balEl.style.color = balance<0 ? "var(--expense)" : "var(--text)";
    var sub = document.getElementById("balSub");
    if(income>0){
      var rate = Math.round((balance/income)*100);
      sub.textContent = balance>=0 ? "Saved "+rate+"% of income" : "Overspent by "+fmt(-balance);
    } else { sub.textContent = expense>0 ? "No income logged" : ""; }

    renderList(mtx);
    renderChart(mtx);
  }

  function renderList(mtx){
    var filter = document.getElementById("filterType").value;
    var list = mtx.slice().sort(function(a,b){
      return b.date.localeCompare(a.date) || b.created - a.created;
    });
    if(filter!=="all") list = list.filter(function(t){ return t.kind===filter; });

    var el = document.getElementById("txList");
    if(!list.length){
      el.innerHTML = '<li class="empty"><div class="em-ic">🗒️</div><p>'+
        (currentMonthTx().length ? "No "+filter+" transactions this month." : "No transactions yet this month.<br>Add one on the right to get started.")+
        '</p></li>';
      return;
    }
    el.innerHTML = list.map(function(t){
      var d = new Date(t.date+"T00:00:00");
      var dstr = d.toLocaleDateString(undefined,{day:"numeric", month:"short"});
      return '<li class="tx" data-id="'+t.id+'">'+
        '<div class="ic">'+catIcon(t.kind,t.category)+'</div>'+
        '<div class="meta"><div class="desc">'+esc(t.desc)+'</div>'+
        '<div class="info">'+esc(t.category)+' · '+dstr+'</div></div>'+
        '<div class="val '+t.kind+'">'+(t.kind==="income"?"+":"−")+fmt(t.amount)+'</div>'+
        '<button class="del" title="Delete" aria-label="Delete transaction">✕</button>'+
      '</li>';
    }).join("");
  }

  function renderChart(mtx){
    var area = document.getElementById("chartArea");
    var byCat = {};
    mtx.forEach(function(t){
      if(t.kind!=="expense") return;
      byCat[t.category] = (byCat[t.category]||0) + t.amount;
    });
    var rows = Object.keys(byCat).map(function(k){ return {name:k, val:byCat[k]}; })
                     .sort(function(a,b){ return b.val - a.val; });
    var total = rows.reduce(function(s,r){ return s+r.val; }, 0);

    if(!total){
      area.innerHTML = '<div class="empty"><div class="em-ic">📊</div><p>No expenses to chart yet.</p></div>';
      return;
    }

    // donut
    var R=54, r=34, cx=66, cy=66, C=2*Math.PI*R, off=0;
    var segs = rows.map(function(row,i){
      var frac = row.val/total, len = frac*C;
      var color = cssVar(CAT_COLORS[i % CAT_COLORS.length]);
      var s = '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+color+'" '+
              'stroke-width="'+(R-r)+'" stroke-dasharray="'+len+' '+(C-len)+'" '+
              'stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
      off += len; return s;
    }).join("");
    var donut = '<svg class="donut" viewBox="0 0 132 132" width="132" height="132" role="img" aria-label="Expense breakdown by category">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="var(--line)" stroke-width="'+(R-r)+'"/>'+
      segs+
      '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="var(--text-mute)" font-size="8" font-family="var(--sans)">SPENT</text>'+
      '<text x="'+cx+'" y="'+(cy+11)+'" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700" font-family="var(--sans)">'+fmt(total)+'</text>'+
    '</svg>';

    var legend = '<div class="legend">'+ rows.map(function(row,i){
      var color = cssVar(CAT_COLORS[i % CAT_COLORS.length]);
      var pct = Math.round((row.val/total)*100);
      return '<div class="legend-row">'+
        '<span class="dot" style="background:'+color+'"></span>'+
        '<span class="nm">'+esc(row.name)+'</span>'+
        '<span class="amt">'+fmt(row.val)+'</span>'+
        '<span class="pct">'+pct+'%</span>'+
      '</div>';
    }).join("") + '</div>';

    area.innerHTML = '<div class="chart-wrap">'+donut+legend+'</div>';
  }

  // ---------- Category dropdown ----------
  function fillCategories(){
    var sel = document.getElementById("fCategory");
    sel.innerHTML = CATEGORIES[kind].map(function(c){
      return '<option value="'+esc(c[0])+'">'+c[1]+"  "+esc(c[0])+'</option>';
    }).join("");
  }

  // ---------- Events ----------
  document.getElementById("kindSeg").addEventListener("click", function(e){
    var b = e.target.closest("button[data-kind]"); if(!b) return;
    kind = b.dataset.kind;
    Array.prototype.forEach.call(this.children, function(c){ c.classList.toggle("active", c===b); });
    fillCategories();
  });

  document.getElementById("txForm").addEventListener("submit", function(e){
    e.preventDefault();
    var desc = document.getElementById("fDesc").value.trim();
    var amount = parseFloat(document.getElementById("fAmount").value);
    var date = document.getElementById("fDate").value;
    var category = document.getElementById("fCategory").value;
    if(!desc || !(amount>0) || !date){ toast("Please fill in all fields"); return; }

    tx.push({ id:uid(), kind:kind, desc:desc, amount:Math.round(amount*100)/100,
              date:date, category:category, created:Date.now() });
    save();

    // jump view to the month of the added tx
    viewDate = new Date(date+"T00:00:00"); viewDate.setDate(1);
    this.reset();
    document.getElementById("fDate").value = date;
    render();
    toast("Added " + (kind==="income"?"income":"expense"));
    document.getElementById("fDesc").focus();
  });

  document.getElementById("txList").addEventListener("click", function(e){
    if(!e.target.classList.contains("del")) return;
    var li = e.target.closest(".tx"); var id = li.dataset.id;
    tx = tx.filter(function(t){ return t.id!==id; });
    save(); render(); toast("Deleted");
  });

  document.getElementById("filterType").addEventListener("change", render);
  document.getElementById("prevMonth").addEventListener("click", function(){
    viewDate.setMonth(viewDate.getMonth()-1); render();
  });
  document.getElementById("nextMonth").addEventListener("click", function(){
    viewDate.setMonth(viewDate.getMonth()+1); render();
  });

  // ---------- Theme ----------
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
  }
  document.getElementById("themeBtn").addEventListener("click", function(){
    var cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur==="dark" ? "light" : "dark");
    render(); // recompute chart colors
  });
  (function initTheme(){
    var saved; try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
    if(saved) applyTheme(saved);
  })();

  // ---------- CSV export / import ----------
  document.getElementById("exportBtn").addEventListener("click", function(){
    if(!tx.length){ toast("Nothing to export"); return; }
    var head = "date,kind,category,description,amount\n";
    var body = tx.slice().sort(function(a,b){ return a.date.localeCompare(b.date); })
      .map(function(t){
        return [t.date, t.kind, csv(t.category), csv(t.desc), t.amount.toFixed(2)].join(",");
      }).join("\n");
    var blob = new Blob([head+body], {type:"text/csv"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ledger-"+new Date().toISOString().slice(0,10)+".csv";
    a.click(); URL.revokeObjectURL(a.href);
    toast("Exported "+tx.length+" transactions");
  });
  function csv(s){ s = String(s); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }

  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importFile").click();
  });
  document.getElementById("importFile").addEventListener("change", function(e){
    var file = e.target.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var rows = parseCSV(reader.result);
        var added = 0;
        rows.forEach(function(r){
          if(!r.date || !r.amount) return;
          var amt = parseFloat(r.amount); if(!(amt>0)) return;
          tx.push({ id:uid(), kind:(r.kind==="income"?"income":"expense"),
                    desc:r.description||"Imported", amount:Math.round(amt*100)/100,
                    date:r.date.slice(0,10), category:r.category||"Other", created:Date.now()+added });
          added++;
        });
        save(); render();
        toast(added ? "Imported "+added+" transactions" : "No valid rows found");
      }catch(err){ toast("Couldn't read that CSV"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  });
  function parseCSV(text){
    var lines = text.replace(/\r/g,"").split("\n").filter(function(l){ return l.trim(); });
    if(!lines.length) return [];
    var headers = splitCSVLine(lines[0]).map(function(h){ return h.trim().toLowerCase(); });
    return lines.slice(1).map(function(line){
      var cells = splitCSVLine(line); var obj = {};
      headers.forEach(function(h,i){ obj[h] = (cells[i]||"").trim(); });
      return obj;
    });
  }
  function splitCSVLine(line){
    var out=[], cur="", q=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(q){ if(ch==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=ch; }
      else { if(ch===','){ out.push(cur); cur=""; } else if(ch==='"'){ q=true; } else cur+=ch; }
    }
    out.push(cur); return out;
  }

  document.getElementById("clearBtn").addEventListener("click", function(){
    if(!tx.length){ toast("No data to clear"); return; }
    if(confirm("Delete ALL transactions? This cannot be undone.")){
      tx = []; save(); render(); toast("All data cleared");
    }
  });

  // ---------- Toast ----------
  var toastTimer;
  function toast(msg){
    var el = document.getElementById("toast");
    el.textContent = msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2200);
  }

  // ---------- Init ----------
  document.getElementById("fDate").value = new Date().toISOString().slice(0,10);
  fillCategories();
  render();
})();
</script>
</body>
</html>
